<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Hiring Report — 2026-03-18</title>
    <script>window.twttr = (function(d, s, id) {
        var js, fjs = d.getElementsByTagName(s)[0], t = window.twttr || {};
        if (d.getElementById(id)) return t;
        js = d.createElement(s);
        js.id = id;
        js.src = "https://platform.twitter.com/widgets.js";
        js.async = true;
        fjs.parentNode.insertBefore(js, fjs);
        t._e = []; t.ready = function(f) { t._e.push(f); };
        return t;
    }(document, "script", "twitter-wjs"));</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1419; color: #e7e9ea; min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; padding: 20px; background: #1a1f2e; border-radius: 12px; }
        .header h1 { font-size: 1.8rem; margin-bottom: 10px; background: linear-gradient(90deg, #00d4aa, #00a8e8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stats { display: flex; gap: 20px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .stat { background: #2a3142; padding: 10px 20px; border-radius: 8px; }
        .stat-num { font-size: 1.5rem; font-weight: bold; color: #00d4aa; }
        .stat-label { font-size: 0.85rem; color: #8892b0; }
        .card { background: #1a1f2e; border-radius: 12px; padding: 20px; margin-bottom: 30px; border: 1px solid #2a3142; }
        .footer { text-align: center; color: #8892b0; margin-top: 30px; padding: 20px; }
        .section-title { font-size: 1.2rem; color: #00d4aa; margin: 30px 0 15px; padding-bottom: 10px; border-bottom: 1px solid #2a3142; }
        .tweet-embed { margin-top: 15px; min-height: 150px; }
        .nav { margin-bottom: 20px; text-align: center; }
        .nav a { color: #00d4aa; text-decoration: none; margin: 0 10px; }
        .nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav"><a href="index.html">← All Reports</a></div>
        <div class="header">
            <h1>Web3 Hiring Report</h1>
            <p>2026-03-18</p>
            <div class="stats">
                <div class="stat"><div class="stat-num">29</div><div class="stat-label">Total Posts</div></div>
                <div class="stat"><div class="stat-num">20</div><div class="stat-label">High Priority</div></div>
                <div class="stat"><div class="stat-num">19</div><div class="stat-label">Verified</div></div>
            </div>
        </div>
        <h2 class="section-title">Top Hiring Opportunities</h2>
        <div id="opportunities"></div>
        <div class="footer"><p>Generated by @SuccessHunter</p></div>
    </div>
    <script>
    async function loadReport() {
        try {
            const response = await fetch('web3_hiring_posts_2026-03-18.json');
            const data = await response.json();
            const results = data.results || [];
            const priorityKeywords = ['hiring', 'hired', 'job', 'role', 'position', 'gtm', 'marketing', 'growth', 'lead', 'head'];
            const filtered = results.filter(post => {
                const text = (post.text || '').toLowerCase();
                const followers = post.followers || 0;
                const isVerified = post.is_verified || false;
                const isHiring = priorityKeywords.some(kw => text.includes(kw));
                return isHiring && (followers >= 500 || isVerified);
            });
            
            const container = document.getElementById('opportunities');
            if (window.twttr) {
                window.twttr.ready(function(twttr) {
                    filtered.slice(0, 10).forEach(post => {
                        const div = document.createElement('div');
                        div.className = 'card';
                        div.innerHTML = '<div class="tweet-embed" id="tweet-" + post.tweet_id + ""></div>';
                        container.appendChild(div);
                        if (post.twitter_url) {
                            twttr.widgets.createTweet(post.tweet_id, document.getElementById('tweet-" + post.tweet_id + "'), {theme: 'dark', dnt: true});
                        }
                    });
                });
            }
        } catch(e) { console.error(e); }
    }
    loadReport();
    </script>
</body>
</html>
